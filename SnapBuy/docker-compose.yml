services:
  server:
    build:
      context: .
    container_name: SnapBuy-App
    image: snapbuy-app:latest
    ports:
      - "8080:8080"
    networks:
      - s-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DATASOURCE_URL=jdbc:mysql://mysql:3306/SnapBuy
      - DATASOURCE_USERNAME=SnapBuy-MySQL
      - DATASOURCE_PASSWORD=${DB_PASSWORD}
    env_file:
      - .env
    restart: unless-stopped

  mysql:
    image: mysql:latest
    container_name: SnapBuy-MySQL
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: SnapBuy
      MYSQL_USER: SnapBuy-MySQL
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - s-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  s-network:
    driver: bridge